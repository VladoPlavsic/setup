# Enable True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

set -g focus-events on
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 9999999

set-option -g prefix C-\;
set-option -g prefix2 none

unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind v
bind v copy-mode

# resizing panes with hjkl
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize panes
bind -r m resize-pane -Z
bind e select-layout even-horizontal 
bind M select-layout main-horizontal
bind V select-layout main-vertical

# mouse support
set -g mouse on

# vim shell navigations and selects in tmux panes
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Instant switch to a new tmux session directory that exist
bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer"
bind-key n command-prompt "new-session -s '%%'"

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"

# Drag copy using mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# tmux plugin manager 
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm' # must be the first plugin
set -g @plugin "christoomey/vim-tmux-navigator"

set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate
# set -g @plugin "tmux-plugins/tmux-resurrect" #persist tmux sessions after computer restart
set -g @plugin "tmux-plugins/tmux-continuum" # automatically save sessions every 15mins
set -g @plugin 'laktak/tome' # store commands to quick access

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @sessionx-bind 'o'
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

# Configure Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Alternative theme for status bars and so
# set -g @plugin 'egel/tmux-gruvbox'
# # Configure Gruvbox
# set -g @tmux-gruvbox 'dark'
# set -g @tmux-gruvbox-statusbar-alpha 'true'
# # display hostname and enhance section with other plugin
# set -g @tmux-gruvbox-right-status-z '#h #{tmux_mode_indicator}'

# Tome
set -g @tome_playbook $HOME/.playbook.md

# Configure Online status
set -g @online_icon "ok"
set -g @offline_icon "nok"

# status left look and feel
set -g focus-events on
set -g status-style bg=default
set -g status-left-length 99
set -g status-right-length 99
set -g status-justify absolute-centre
set -g status-left-length 100
set -g status-left ""


# pane border look and feel with arrow indicators
setw -g pane-border-status top
setw -g pane-border-format "#{?pane_active,#[fg=#{@thm_peach}] ▼ ,}"
setw -g pane-active-border-style "fg=#{@thm_peach}"
setw -g pane-border-style "fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format "#[bg=#{@thm_bg},fg=#{@thm_peach},bold]#[bg=#{@thm_peach},fg=#{@thm_bg},bold] #I#{?#{!=:#{window_name},Window},: #W,} #[bg=#{@thm_bg},fg=#{@thm_peach},bold]"
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

